<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You | Palate Catering</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col">
    <header class="bg-white/70 backdrop-blur border-b border-neutral-200 sticky top-0 z-40">
      <div class="mx-auto max-w-7xl px-6 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <img src="/assets/logo.png" alt="Palate Catering" class="h-10 w-auto" />
          <span class="font-serif text-xl">Palate Catering</span>
        </a>
        <a href="/" class="text-sm hover:opacity-70">← Back to Home</a>
      </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center text-center px-6 py-20">
      <img src="/assets/logo.png" alt="Palate Catering" class="h-16 mb-6 opacity-90" />
      <h1 class="text-4xl font-serif mb-3 text-neutral-900">Thank You for Your Order!</h1>
      <p class="text-neutral-600 max-w-xl mb-8">
        Your order has been received and is being prepared. You'll receive a confirmation email shortly.
      </p>

      <div id="pdfSection" class="hidden flex flex-col items-center space-y-4">
        <a
          id="pdfLink"
          target="_blank"
          rel="noopener"
          class="inline-block rounded-full bg-green-700 px-8 py-3 text-white transition hover:bg-green-800"
        >
          Download Your Order PDF
        </a>
        <p class="text-sm text-neutral-500">A copy has also been sent to our kitchen team.</p>
      </div>

      <a href="/" class="mt-10 inline-block text-neutral-700 underline underline-offset-4 hover:text-neutral-900">
        Return to Home
      </a>
    </main>

    <footer class="border-t border-neutral-200 py-10 text-center text-sm text-neutral-500">
      © <span id="year"></span> Palate Catering. All rights reserved.
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get("pdf");
        const dataUrl = sessionStorage.getItem("palate_pdf_dataurl");
        const finalUrl = pdfUrl || dataUrl;
        const pdfSection = document.getElementById("pdfSection");
        const pdfLink = document.getElementById("pdfLink");

        if (!finalUrl || !pdfSection || !pdfLink) return;

        pdfLink.href = finalUrl;
        pdfSection.classList.remove("hidden");
      });
    </script>
  </body>
</html>
